<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanBan Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/board.css">
</head>
<body>
    <header>
        <h1> <span class="title-deco">KanBan</span> Board</h1>
        <p class="desritpion">KanBan Board helps teams visualize progress, limit work-in-progress (WIP), and identify bottlenecks, improving efficiency and
        communication.</p>
    </header>
    <main class="board">
            <section class="todo-section">
                <h2>To do:</h2>
                <div class="tasks">
                    <div class="task">task
                        <button class="move-right">
                            <img src="./arrow.svg" width="20" height="20">
                        </button>
                    </div>
                    <div class="task">task
                        <button class="move-right">
                            <img src="./arrow.svg" width="20" height="20">
                        </button>
                    </div>
                    <div class="task">task
                        <button class="move-right">
                            <img src="./arrow.svg" width="20" height="20">
                        </button>
                    </div>
                    <div class="task">task
                        <button class="move-right">
                            <img src="./arrow.svg" width="20" height="20">
                        </button>
                    </div>
                </div>
            </section>
            <section class="in-progress-section">
                <h2> In progress:</h2>
                <div class="tasks">
                    <div class="task">task
                        <button class="move-right">
                            <img src="./arrow.svg" width="20" height="20">
                        </button>
                    </div>
                    <div class="task">task
                        <button class="move-right">
                            <img src="./arrow.svg" width="20" height="20">
                        </button>
                    </div>
                    <div class="task">task
                        <button class="move-right">
                            <img src="./arrow.svg" width="20" height="20">
                        </button>
                    </div>
                </div>
            </section>
            <section class="done-section">
                <h2>Done:</h2>
                <div class="tasks">
                    <div class="task">task</div>
                    <div class="task">task</div>
                </div>
            </section>
    </main>
    <footer>
        <a class="git-link" href="https://github.com/AnnaShunkar/kanban-board" target="_blank">Wanna know how it was
            created?</a>
        <p>2026</p>
    </footer>
    <script src="./js/tasks.js"></script>
</body>
</html>
