<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanBan Board</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>KanBan Board</h1>
        <p>KanBan Board helps teams visualize progress, limit work-in-progress (WIP), and identify bottlenecks, improving efficiency and
        communication.</p>
    </header>
    <main class="board">
        <section class="todo-section">
            <div>1</div>
        </section>
        <section class="in-progress-section">
            <div>1</div>
        </section>
        <section class="done-section">
            <div>1</div>
        </section>
    </main>
    <footer>
        <p>2026</p>
    </footer>
</body>
</html>
